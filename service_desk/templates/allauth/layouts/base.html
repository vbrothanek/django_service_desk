{% load static %}

<!doctype html>
<html lang="en" data-bs-theme="auto">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{% block title %}Service Desk{% endblock %}</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

		<link href="{% static 'service_desk/css/bootstrap.min.css' %}" rel="stylesheet">
		<link href="{% static 'service_desk/css/style.css' %}" rel="stylesheet">

		<style>
			.form-text { display: none; }
		</style>

		{% block extra_head %}{% endblock %}
	</head>

	<body class="d-flex justify-content-center align-items-center" style="min-height:100vh; background:#f5f5f5;">

	<div style="width: 100%; max-width: 380px;">
		  <div class="mb-5 text-center">
			  <span class="sidebar-logo" style="font-size: 20px; color: #212529;">
				  <span class="sidebar-logo-dot" style="width: 9px; height: 9px;"></span>Service Desk
			  </span>
			  <p class="text-muted mt-2 mb-0" style="font-size: 13px;">Login to your account</p>
		  </div>
		{% block content %}{% endblock %}
	</div>

	<script src="{% static 'service_desk/js/bootstrap.bundle.min.js'%}"></script>

	{% block extra_js %}{% endblock %}

	</body>
</html>
